services:
  postgres:
    image: postgres:16
    # pg_stat_statements must be loaded at server start, not just CREATE EXTENSION'd.
    command: postgres -c shared_preload_libraries=pg_stat_statements
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d demo"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  # sql-analyzer is a one-shot CLI, not a long-running server: Flyway migrations
  # run automatically on startup, but you invoke commands with
  # `docker compose run app <analyze|explain|compare> [--option=value ...]`,
  # not `docker compose up app`.
  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Maps to the `database.url` property via Spring's relaxed env-var binding.
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/demo?sslmode=disable"

volumes:
  pgdata:
